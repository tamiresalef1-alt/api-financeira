<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Dashboard Financeira</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Isso muda o fundo para um preto elegante */
body {
    font-family: Arial, sans-serif;
    background-color: #121212; 
    color: white;
    margin: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Isso deixa o quadrado do gráfico escuro e moderno */
.container {
    width: 95%; 
    max-width: 800px; 
    margin: 20px auto; /* Centraliza tudo */
    background-color: #1e1e1e;
    padding: 15px;
    border-radius: 15px;
} /* VERIFIQUE SE ESSA CHAVE ESTÁ AQUI */

h2 {
    color: #ffeb3b; /* Título em Amarelo Reggae */
}

h2 {
    color: #ffeb3b; /* Título em Amarelo Reggae */
}
    </style>
</head>
<body>
    <div class="container">
    <h2>📊 Minhas Transações</h2>
    
    <div style="position: relative; height: 300px; width: 100%;">
        <canvas id="meuGrafico"></canvas>
    </div>
    
    <table id="tabelaDados">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Descrição</th>
                    <th>Valor (R$)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function carregarDados() {
            const response = await fetch('http://localhost:3000/dados');
            const dados = await response.json();
            
            const corpoTabela = document.querySelector('#tabelaDados tbody');
            const descricoes = [];
            const valores = [];

            dados.forEach(item => {
                // Preenche a tabela
                corpoTabela.innerHTML += `<tr><td>${item.id}</td><td>${item.descricao}</td><td>${item.valor.toFixed(2)}</td></tr>`;
                // Prepara dados para o gráfico
                descricoes.push(item.descricao);
                valores.push(item.valor);
            });

            // Cria o gráfico
            new Chart(document.getElementById('meuGrafico'), {
                type: 'bar',
                data: {
                    labels: descricoes,
                    datasets: [{
                        label: 'MOVIMENTACÃO TAMIRES JAQUES',
                        data: valores,
                        backgroundColor: [
                '#e53935', // Vermelho
                '#fbc02d', // Amarelo
                '#388e3c'  // Verde
            ],
            borderColor: [
                '#b71c1c', 
                '#f9a825', 
                '#2e7d32'
            ],
            borderWidth: 2
                        
                
                    }]
                }
            });
        }
        carregarDados();
    </script>
</body>
</html>
